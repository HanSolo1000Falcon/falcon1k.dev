<!doctype html>
<head>
	<meta charset="UTF-8" />
	<title>HanSolo1000Falcon</title>

	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
	<link href="/style.css" rel="stylesheet" />
</head>
<body>
	<div id="blur-overlay">
		<h2>To view this page you must accept cookies.</h2>
		<button id="enter-btn">Accept cookies</button>
	</div>

	<video autoplay muted loop playsinline id="bg-video"></video>

	<div class="middle-panel">
		<h1>Vote on the current poll!</h1>

		<hr />

		<h2 id="poll-name">Waiting for poll...</h2>
		<ul id="options"></ul>

		<hr />

		<p>
			<b><a href="/">Go back home</a></b>
		</p>
	</div>

	<script type="module">
		const randomNumber =
			Math.floor(
				Math.random() * 3 /* Note to self: when changing the number here, make sure to change it in all the other HTML files too!!! */,
			) + 1;
		const video = document.getElementById('bg-video');
		const pollNameElem = document.getElementById('poll-name');
		const optionsElem = document.getElementById('options');
		const blurOverlay = document.getElementById('blur-overlay');
		const enterBtn = document.getElementById('enter-btn');

		video.innerHTML = `
    		<source
    			src="https://raw.githubusercontent.com/hansolo1000falcon/files/main/calming-winter-video_${randomNumber}.mp4"
    			type="video/mp4" />
    		`;

		async function vote(option, pollName) {
			try {
				await fetch('https://api.falcon1k.dev/poll/upload', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
					},
					body: JSON.stringify({ votedFor: option }),
				});

                const pollsVoted = localStorage.getItem('pollsVoted')
                    ? JSON.parse(localStorage.getItem('pollsVoted'))
                    : [];
				pollsVoted.push(pollName);
				localStorage.setItem('pollsVoted', JSON.stringify(pollsVoted));
				fetchPoll();
			} catch (err) {
				console.error('Vote failed:', err);
			}
		}

		async function fetchPoll() {
			const response = await fetch('https://api.falcon1k.dev/poll/current');
			const poll = await response.json();

			const hasAlreadyVoted = localStorage.getItem('pollsVoted')
				? JSON.parse(localStorage.getItem('pollsVoted')).includes(poll.pollName)
				: false;

			if (hasAlreadyVoted) {
				pollNameElem.textContent = 'You have already voted on this poll!';
				optionsElem.innerHTML = '';
				return;
			}

			pollNameElem.textContent = poll.pollName;
			optionsElem.innerHTML = '';
			for (let i = 0; i < poll.options.length; i++) {
				const option = poll.options[i];
				const li = document.createElement('li');

				const button = document.createElement('button');
				button.textContent = option;
				button.onclick = () => vote(i, poll.pollName);

				li.appendChild(button);
				optionsElem.appendChild(li);
			}
		}

		fetchPoll();
		setInterval(fetchPoll, 5000);

		if (localStorage.getItem('cookiesAccepted') === 'true') {
			blurOverlay.classList.add('hidden');
		}

		enterBtn.addEventListener('click', () => {
			localStorage.setItem('cookiesAccepted', 'true');
			blurOverlay.classList.add('hidden');
		});
	</script>
</body>
