<!DOCTYPE html>
<head>
	<meta charset="UTF-8">
	<title>404 - Page Not Found</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
	<link href="/style.css" rel="stylesheet">
</head>
<body>

<video autoplay muted loop playsinline id="bg-video"></video>

<div class="middle-panel">
	<h1>404</h1>
	<h2>Page Not Found</h2>
	<p>Looks like you wandered off the map, traveler. This page either doesn’t exist or has been moved.</p>
	<hr>
	<p>Chill, you can <a href="/">go back home</a> or check out <a href="https://github.com/hansolo1000falcon">my
		GitHub</a> for cool stuff instead.</p>
</div>

<script type="module">
	const randomNumber = Math.floor(Math.random() * 3/* Note to self: when changing the number here, make sure to change it in './main.html' too!!! */) + 1;
	const video = document.getElementById('bg-video');

	video.innerHTML = `
		<source
			src="https://raw.githubusercontent.com/hansolo1000falcon/files/main/calming-winter-video_${randomNumber}.mp4"
			type="video/mp4" />
		`;
</script>

</body>
